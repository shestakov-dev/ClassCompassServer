name: Build and push image to GHCR

on:
    workflow_run:
        workflows: ["Lint and Format", "Run tests"]
        branches: ["main"]
        types:
            - completed
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set outputs
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/class-compass-server:latest
                      ghcr.io/${{ github.repository_owner }}/class-compass-server:${{ steps.vars.outputs.sha_short }}
